<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Typing Speed Test</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="navbar">
    <img src="assets\images\logo-large.svg" alt="logo">
    <p style="display: flex; align-items: center; "> <img src="assets\images\icon-personal-best.svg" alt="Cup">
      Personal best: <span style="color: hsl(0, 0%, 100%);" id=best-wmp>0 WPM</span> </p>
  </header>
  <main>
    <div class="game-settings">
      <section class="game-stats">
        WPM: <span id="wpm">0</span>
        Accuracy:<span id="accuracy">100%</span>
        Time: <span id="time">60s</span>
      </section>
      <section class="game-options">
        <div class="difficulty">
          Difficulty:
          <button id="easy">Easy</button>
          <button id="medium">Medium</button>
          <button id="hard">Hard</button>
        </div>
        <div class="mode">
          Mode:
          <button class="timed-button">Timed (60s)</button>
          <button class="passage-button">Passage</button>
        </div>
      </section>
    </div>
    <section class="typing-area">
      <button class="start-test"> Start typing test</button>
      <p>Or click the text and start typing</p>
    </section>
    <button id="reset-button"> Restart Test</button>

  </main>






  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Javnievic</a>.
  </footer>
  <script defer src="script.js"></script>
</body>

</html>
