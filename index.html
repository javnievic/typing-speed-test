<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Typing Speed Test</title>

  <link rel="stylesheet" href="style.css">

  <!-- Attribution styles -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header class="navbar">
    <picture>
      <source srcset="assets/images/logo-small.svg" media="(max-width: 768px)">
      <img src="assets/images/logo-large.svg" alt="logo">
    </picture>
    <p class="personal-best">
      <img src="assets/images/icon-personal-best.svg" alt="Cup">
      <span class="label desktop-text">Personal best:</span>
      <span class="label mobile-text">Best:</span>
      <span style="color: hsl(0, 0%, 100%);" id="best-wmp"></span>
    </p>
  </header>

  <!-- Main content -->
  <main>
    <!-- Test Screen -->
    <div class="test-screen">
      <!-- Game Settings -->
      <div class="game-settings">
        <!-- Stats -->
        <section class="game-stats">
          <div class="game-stat">
            <span>WPM:</span> <span class="stat-value" id="wpm">0</span>
          </div>
          <div class="vertical-divider"></div>
          <div class="game-stat">
            <span>Accuracy:</span> <span class="stat-value" id="accuracy">100%</span>
          </div>
          <div class="vertical-divider"></div>
          <div class="game-stat">
            <span>Time:</span> <span class="stat-value" id="time">60s</span>
          </div>
        </section>

        <!-- Options -->
        <section class="game-options">
          <div class="difficulty-options">
            <span class="label">Difficulty:</span>
            <button class="selection-btn active" data-difficulty="easy">Easy</button>
            <button class="selection-btn" data-difficulty="medium">Medium</button>
            <button class="selection-btn" data-difficulty="hard">Hard</button>
          </div>
          <!-- Mobile Dropdown -->
          <div class="dropdown" id="difficulty-dropdown">
            <button class="dropdown-btn" id="difficulty-dropdown-btn"> <span> Easy</span> <img src="assets/images/icon-down-arrow.svg"></button>

            <div class="dropdown-menu">
              <div class="dropdown-item active" data-difficulty="easy">
                <span class="dot" ></span>
                Easy
              </div>

              <div class="dropdown-item" data-difficulty="medium">
                <span class="dot"></span>
                Medium
              </div>

              <div class="dropdown-item" data-difficulty="hard">
                <span class="dot"></span>
                Hard
              </div>
            </div>
          </div>
          
          <div class="dropdown" id="mode-dropdown">
            <button class="dropdown-btn" id="mode-dropdown-btn"><span>Timed (60s)</span> <img src="assets/images/icon-down-arrow.svg"></button>

            <div class="dropdown-menu">
              <div class="dropdown-item active" data-mode="timed">
                <span class="dot selected" ></span>
                Timed (60s)
              </div>

              <div class="dropdown-item" data-mode="passage">
                <span class="dot"></span>
                Passage
              </div>
            </div>
          </div>

          <div class="vertical-divider"></div>
          <div class="mode-options">
            <span class="label">Mode:</span>
            <button class="selection-btn active" data-mode="timed">Timed (60s)</button>
            <button class="selection-btn" data-mode="passage">Passage</button>
          </div>
        </section>
      </div>

      <hr>

      <!-- Typing Area -->
      <section class="typing-area">
        <p class="text-display" id="text-display"></p>

        <div class="start-test-container" id="start-test-container">
          <button class="start-test-btn" id="start-test-btn">Start typing test</button>
          <p>Or click the text and start typing</p>
        </div>
      </section>

      <!-- Restart Button -->
      <div class="restart-container hidden" id="restart-container">
        <hr>
        <button class="restart-test-btn" id="restart-test-btn">
          Restart Test
          <img src="assets/images/icon-restart.svg" alt="Restart">
        </button>
      </div>
    </div>

    <!-- Results Screen -->
    <div class="results-screen hidden">
      <img id="results-icon" alt="" />
      <div class="results-header">
        <h1>Test Complete!</h1>
        <p>Solid run. Keep pushing to beat your high score.</p>
      </div>

      <div class="result-stats-container">
        <div class="stat-box">WPM: <span class="stat-value" id="final-wpm"></span></div>
        <div class="stat-box">Accuracy: <span class="stat-value" id="final-accuracy"></span></div>
        <div class="stat-box">
          Characters:
          <div>
            <span class="stat-value" id="final-correct">0</span>
            <span class="stat-value">/</span>
            <span class="stat-value" id="final-incorrect">0</span>
          </div>
        </div>
      </div>

      <button class="new-test-btn" id="new-test-btn">
        Go again
        <img style="filter: brightness(0);" src="assets/images/icon-restart.svg" alt="Restart">
      </button>
        <div id="stars-overlay">
          <img id="star-1" src="assets/images/pattern-star-1.svg"> 
          <img id="star-2" src="assets/images/pattern-star-2.svg"> 
        </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Javnievic</a>.
  </footer>

  <img id="confetti-overlay" src="assets/images/pattern-confetti.svg"/> 

  <script defer src="script.js"></script>
</body>

</html>
